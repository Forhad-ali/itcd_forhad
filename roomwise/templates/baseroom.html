<!DOCTYPE html>
<html>
<head>
    <title>RoomWise</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<body>

<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
    <div class="container-fluid">

        <a class="navbar-brand" href="/dashboard/">
           
            RoomWise
        </a>

        <ul class="navbar-nav d-flex flex-row gap-3">

            <li><a class="nav-link text-white" href="{% url 'facility_list' %}">Facility</a></li>
            <li><a class="nav-link text-white" href="{% url 'system_list' %}">System</a></li>
            <li><a class="nav-link text-white" href="{% url 'room_list' %}">Room</a></li>
            <li><a class="nav-link text-white" href="{% url 'device_list' %}">Device</a></li>
            

        </ul>
    </div>
</nav>

<div class="container mt-4">
    {% if messages %}
        {% for message in messages %}

            <div class="alert alert-{{ message.tags }} alert-dismissible fade show">

                {% if message.tags == 'error' %}
                    <strong>⚠ Deletion Blocked!</strong><br>
                {% endif %}

                {{ message }}

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="alert">
                </button>

            </div>

        {% endfor %}
    {% endif %}
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
