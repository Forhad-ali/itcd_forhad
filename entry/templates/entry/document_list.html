<!DOCTYPE html>
<html>
<head>
    <title>Document List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-4">
    <h3 class="mb-4">📄 Document Reference List.  Total Unique MS:       {{ unique_count }}</h3>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>Facility</th>
                <th>System</th>
                <th>Doc Ref</th>
                <th>Version</th>
            </tr>
        </thead>
        <tbody>
            {% for doc in documents %}
            <tr>
                <td>{{ doc.facility.code }}</td>
                <td>{{ doc.system.code }}</td>
                <td>{{ doc.doc_ref|default:"-" }}</td>
                <td>{{ doc.doc_ver|default:"-" }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" class="text-center">No documents found</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
