
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Cameras</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body { 
        background: #a51684; 
        color: #fff; 
        padding-top: 70px; 
        padding-bottom: 50px; 
        text-align: center; 
    }
    #liveFeed { 
        width: 75vw; 
        height: 75vh; 
        object-fit:cover; 
        border-radius: 8px; 
        border: 2px solid #fff;
    }
    .camera-button { 
        margin: 2px; 
    }
    h1 {
        margin-bottom: 2px;
    }
</style>
</head>
<body>

{% include 'camera_app/navbar.html' %}

<h3>Live Camera View</h3>

<img id="liveFeed" src="{% url 'camera_app:video_feed' cameras.0 %}" alt="Live Feed">
<div class="mb-4">
    {% for cam in cameras %}
    <button class="btn btn-outline-light camera-button" data-cam="{{ cam }}">
        Camera {{ cam }}
    </button>
    {% endfor %}
</div>
<script>
    
    const buttons = document.querySelectorAll('.camera-button');
    const liveFeed = document.getElementById('liveFeed');

    buttons.forEach(button => {
        button.addEventListener('click', function() {
            const camIndex = this.dataset.cam; 
            
            liveFeed.src = "{% url 'camera_app:video_feed' 0 %}".replace('/0/', '/' + camIndex + '/');
        });
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
