<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recent Image</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta http-equiv="refresh" content="10">
    <style>
        body {
            margin: 0;
            padding-top: 70px;
            background: #f7f7f6;
        }

       
        .wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 70px);
        }

        .image-box {
            position: relative;
            width: 80%;
            height: 80%;
        }

        
        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        
        .time-overlay {
            position: absolute;
            bottom: 15px;
            left: 15px;
            color: #00ff00;
            font-size: 18px;
            font-weight: bold;
            background: rgba(0,0,0,0.4);
            padding: 6px 12px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

{% include 'camera_app/navbar.html' %}

{% if image %}
<div class="wrapper">

    <div class="image-box">
        <img src="{{ image.image.url }}" alt="Recent Image">

        
        <div class="time-overlay">
            {{ image.created_at|date:"M d, Y H:i:s" }}
        </div>
    </div>

</div>
{% else %}
<div class="container mt-4">
    <p>No images captured yet.</p>
</div>
{% endif %}


<script>
setTimeout(function(){
   location.reload();
}, 60000); // 60000 ms = 1 minute
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
